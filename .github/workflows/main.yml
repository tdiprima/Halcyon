name: Build and Package
on:
  release:
    types: [created]

jobs:
  package-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch from GitHub
        uses: actions/checkout@v4

      - name: Set up JDK for Ubuntu
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Maven Project
        run: mvn package --file pom.xml

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: halcyon-jar
          path: Halcyon/target/Halcyon*.jar

      - name: '📦 Upload Package'
        run: |
          gh release upload ${{github.event.release.tag_name}} Halcyon/target/Halcyon*.jar
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
        shell: bash

  package-windows:
    needs: package-ubuntu
    runs-on: windows-latest
    steps:
      - name: Checkout main branch from GitHub
        uses: actions/checkout@v4

      - name: Set up JDK for Windows
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: halcyon-jar
          path: Halcyon\target

      - name: Build Windows package with jpackage
        run: |
          cd Halcyon
          mvn jpackage:jpackage@win

      - name: '📦 Upload Windows Package'
        run: |
          gh release upload ${{github.event.release.tag_name}} Halcyon\dist\Halcyon*.msi
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
